services:
  # --- ETCD (consenso distribuído) ---
  etcd:
    image: quay.io/coreos/etcd:v3.5.12
    container_name: etcd
    environment:
      - ALLOW_NONE_AUTHENTICATION=yes
      - ETCD_ADVERTISE_CLIENT_URLS=http://etcd:2379
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
      - ETCD_DATA_DIR=/etcd-data
    volumes:
      - etcd_data:/etcd-data
    networks:
      collab-network:
        ipv4_address: 172.31.25.5

  # --- POSTGRES PRIMÁRIO COM PATRONI ---
  postgres-primary:
    image: patroni-postgres
    build:
      context: .
      dockerfile: Dockerfile.patroni
    container_name: postgres-primary
    environment:
      - PATRONI_NAME=postgres-primary
      - PATRONI_POSTGRESQL_DATA_DIR=/data/postgres
      - PATRONI_POSTGRESQL_CONNECT_ADDRESS=172.31.25.2:5432
      - PATRONI_RESTAPI_CONNECT_ADDRESS=172.31.25.2:8008
      - PATRONI_ETCD3_HOSTS=etcd:2379
      - PATRONI_SUPERUSER_USERNAME=postgres
      - PATRONI_SUPERUSER_PASSWORD=editor_password
      - PATRONI_REPLICATION_USERNAME=replicator
      - PATRONI_REPLICATION_PASSWORD=editor_password
      - PATRONI_SCOPE=collab-cluster
    volumes:
      - postgres_primary_data:/data/postgres
    networks:
      collab-network:
        ipv4_address: 172.31.25.2

  # --- POSTGRES RÉPLICA COM PATRONI ---
  postgres-replica:
    image: patroni-postgres
    build:
      context: .
      dockerfile: Dockerfile.patroni
    container_name: postgres-replica
    depends_on:
      - postgres-primary
    environment:
      - PATRONI_NAME=postgres-replica
      - PATRONI_POSTGRESQL_DATA_DIR=/data/postgres
      - PATRONI_POSTGRESQL_CONNECT_ADDRESS=172.31.25.3:5432
      - PATRONI_RESTAPI_CONNECT_ADDRESS=172.31.25.3:8008
      - PATRONI_ETCD3_HOSTS=etcd:2379
      - PATRONI_SUPERUSER_USERNAME=postgres
      - PATRONI_SUPERUSER_PASSWORD=editor_password
      - PATRONI_REPLICATION_USERNAME=replicator
      - PATRONI_REPLICATION_PASSWORD=editor_password
      - PATRONI_SCOPE=collab-cluster
    volumes:
      - postgres_replica_data:/data/postgres
    networks:
      collab-network:
        ipv4_address: 172.31.25.3

  haproxy:
    image: haproxy:2.8
    container_name: haproxy
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports:
      - "5432:5432"
    depends_on:
      - postgres-primary
      - postgres-replica
    networks:
      collab-network:
        ipv4_address: 172.31.25.4
    healthcheck:
      test: ["CMD", "haproxy", "-c", "-f", "/usr/local/etc/haproxy/haproxy.cfg"]
      interval: 5s
      timeout: 3s
      retries: 5

  collab-app-1:
    build: .
    image: collab-editor-app-instance-1
    container_name: collab-app-1
    depends_on:
      haproxy:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://haproxy:5432/editor_colaborativo
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=editor_password
    restart: on-failure
    networks:
      - collab-network

  collab-app-2:
    build: .
    image: collab-editor-app-instance-2
    container_name: collab-app-2
    depends_on:
      haproxy:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://haproxy:5432/editor_colaborativo
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=editor_password
    restart: on-failure
    networks:
      - collab-network

  collab-nginx:
    image: nginx:alpine
    container_name: collab-nginx
    ports:
      - "80:80"
    depends_on:
      - collab-app-1
      - collab-app-2
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - collab-network

volumes:
  postgres_primary_data:
  postgres_replica_data:
  etcd_data:

networks:
  collab-network:
    ipam:
      config:
        - subnet: 172.31.25.0/24
