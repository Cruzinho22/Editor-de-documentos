<!DOCTYPE html>
<html>
<head>
    <title>Editor Colaborativo</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div id="home" class="home-screen">
    <h1>Editor Colaborativo</h1>
    <button onclick="app.criarDocumento()">Criar Novo Documento</button>

    <div class="autocomplete">
  <input id="docInput" type="text" placeholder="Pesquisar documento...">
    </div>

</div>

<div id="editorPage" class="hidden">
    <div class="toolbar">
        <button onclick="app.voltar()">Voltar</button>    
    </div>

    <div class="editor-container">
        <div id="editor" contenteditable="true"></div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs/lib/stomp.min.js"></script>
<script src="/js/app.js"></script>

</body>

</html>
