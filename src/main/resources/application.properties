spring.application.name=collab-editor
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Conexão do Banco
spring.datasource.url=jdbc:postgresql://postgres-pgpool:5432/editor_colaborativo
spring.datasource.username=luccas_user
spring.datasource.password=editor_password

# Adicione estas 3 linhas abaixo:
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update